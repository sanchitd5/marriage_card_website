<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 56" width="640" height="56" role="img" aria-label="ornamental divider">
  <defs>
    <!-- Solid near the gem, fading toward the outer ends -->
    <linearGradient id="gLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a24b" stop-opacity="0"/>
      <stop offset="1" stop-color="#c9a24b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a24b" stop-opacity="1"/>
      <stop offset="1" stop-color="#c9a24b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#fbeeb8"/>
      <stop offset="100%" stop-color="#e8c874"/>
    </radialGradient>
    <style>
      .l  { stroke-width: 2; stroke-linecap: round; stroke-dasharray: 240; stroke-dashoffset: 240; animation: draw 1.5s ease forwards; }
      .lR { animation-delay: .12s; }
      @keyframes draw { to { stroke-dashoffset: 0; } }

      .acc { fill: #c9a24b; opacity: 0; animation: fd 1s ease .8s forwards; }
      @keyframes fd { to { opacity: .9; } }

      .gem   { transform-origin: 320px 28px; opacity: 0; animation: pop 1s cubic-bezier(.2,1.5,.4,1) .45s forwards; }
      @keyframes pop { 0%{opacity:0;transform:scale(.2) rotate(45deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }
      .pulse { transform-origin: 320px 28px; animation: pulse 3.2s ease-in-out 1.5s infinite; }
      @keyframes pulse { 0%,100%{transform:scale(1);opacity:.92} 50%{transform:scale(1.12);opacity:1} }

      @media (prefers-reduced-motion: reduce){
        .l,.lR,.acc,.gem,.pulse{animation:none;opacity:1;stroke-dashoffset:0;transform:none}
      }
    </style>
  </defs>

  <!-- Flanking rules -->
  <line class="l"    x1="70"  y1="28" x2="288" y2="28" stroke="url(#gLeft)"/>
  <line class="l lR" x1="352" y1="28" x2="570" y2="28" stroke="url(#gRight)"/>

  <!-- Paisley swirls at the inner ends -->
  <g fill="none" stroke="#c9a24b" stroke-width="1.4" class="acc">
    <path d="M288 28 q14 -12 24 0"/>
    <path d="M352 28 q-14 -12 -24 0"/>
  </g>

  <!-- Beads -->
  <g class="acc">
    <circle cx="60"  cy="28" r="2.2"/>
    <circle cx="580" cy="28" r="2.2"/>
    <circle cx="300" cy="28" r="1.6"/>
    <circle cx="340" cy="28" r="1.6"/>
  </g>

  <!-- Central lotus gem -->
  <g class="pulse">
    <g class="gem">
      <path d="M320 12 q-13 16 0 32 q13 -16 0 -32Z" fill="url(#dGlow)" stroke="#b8862f" stroke-width="1.3"/>
      <path d="M306 18 q-3 12 12 18 M334 18 q3 12 -12 18" stroke="#c9a24b" stroke-width="1.2" fill="none"/>
      <circle cx="320" cy="28" r="2.6" fill="#8a6a3a"/>
    </g>
  </g>
</svg>
